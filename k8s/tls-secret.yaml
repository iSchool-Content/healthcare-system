# TLS Secret — generate with:
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout tls.key -out tls.crt \
#     -subj "/CN=hospital.local/O=hospital"
#   kubectl create secret tls tls-secret \
#     --cert=tls.crt --key=tls.key \
#     -n hospital-aws
#
# The secret below is a placeholder. Replace base64 values with your generated cert.
apiVersion: v1
kind: Secret
metadata:
  name: tls-secret
  namespace: hospital-aws
type: kubernetes.io/tls
data:
  tls.crt: PLACEHOLDER_BASE64_CERT
  tls.key: PLACEHOLDER_BASE64_KEY
