services:
  - type: web
    name: healthcare-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: APPOINTMENT_SERVICE_URL
        fromService:
          name: healthcare-appointments
          type: web
          property: host
          format: https://{host}

  - type: web
    name: healthcare-appointments
    runtime: node
    rootDir: appointment-service
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: MONGODB_URI
        sync: false
