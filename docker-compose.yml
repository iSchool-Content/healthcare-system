services:
  mongo:
    image: mongo:7
    container_name: healthcare-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: healthcare-backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      MONGO_URI: mongodb://mongo:27017/healthcaredb
      APPOINTMENTS_MONGODB_URI: mongodb://mongo:27017/appointmentsdb
      FRONTEND_URL: http://localhost:5173
    ports:
      - "3000:3000"
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  appointment-service:
    build:
      context: ./appointment-service
      dockerfile: Dockerfile
    container_name: healthcare-appointments
    restart: unless-stopped
    env_file: ./appointment-service/.env
    environment:
      MONGO_URI: mongodb://mongo:27017/appointmentsdb
    ports:
      - "3001:3001"
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: healthcare-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
      - appointment-service
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mongo-data:
    driver: local
